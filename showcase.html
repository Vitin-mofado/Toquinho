<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toquinho - Perguntas Educativas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ESTILIZAÇÃO/niveis-rascunho.css">
  <link rel="icon" href="/assets/icons/logo-toquinho.png" type="image/png">
  <link rel="stylesheet" href="/ESTILIZAÇÃO/responsivo.css">
  <link rel="stylesheet" href="/ESTILIZAÇÃO/base.css">
  <link rel="stylesheet" href="/ESTILIZAÇÃO/showcase.css">
</head>
<body>
  <main>
    <header>
      <div class="header-inner">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24" 
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          class="lucide lucide-x-icon lucide-x"
        >
          <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
        </svg>

        <div class="progress-bar">
          <div class="progress-bar-inner"></div>
        </div>
      </div>
    </header>

    <div class="question">
      <div class="question-inner">
        <h1 class="question-text">Selecione a banana</h1>

        <div class="question-options">
          <ol class="question-option-list">
            <button class="question-option" onclick="select(0)">
              <div class="question-option-icon">🍎</div>
            </button>

            <button class="question-option" onclick="select(1)">
              <div class="question-option-icon">🍌</div>
            </button>

            <button class="question-option" onclick="select(2)">
              <div class="question-option-icon">🍇</div>
            </button>

            <button class="question-option" onclick="select(3)">
              <div class="question-option-icon">🍓</div>
            </button>
          </ol>
        </div>
      </div>
    </div>

    <footer data-state="normal">
      <button class="btn-check" onclick="check()">VERIFICAR</button>
      <button class="btn-continue" onclick="_continue()" style="display: none;">CONTINUAR</button>
    </footer>
  </main>

  <script src="/js/showcase.js"></script>
</body>
</html>
